# Transformer model configuration

model:
  name: flare_transformer
  input_size: 8
  d_model: 128
  nhead: 4
  num_layers: 4
  dim_feedforward: 512
  n_classes: 4
  dropout: 0.3
  max_len: 2000

training:
  batch_size: 32
  learning_rate: 0.0005
  max_epochs: 100
  patience: 10
  weight_decay: 1e-4

data:
  path: "data/processed/train.h5"
  val_path: "data/processed/val.h5"
  window_size: 512
  stride: 128

dataloader:
  num_workers: 4
  pin_memory: true
