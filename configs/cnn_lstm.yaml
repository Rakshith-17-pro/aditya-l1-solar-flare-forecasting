# CNN-LSTM model configuration

model:
  name: cnn_lstm
  n_solexs_channels: 4
  n_hel1os_channels: 4
  cnn_channels: [32, 64, 128]
  lstm_hidden: 128
  lstm_layers: 2
  n_classes: 4
  dropout: 0.3

training:
  batch_size: 64
  learning_rate: 0.001
  max_epochs: 100
  patience: 10
  weight_decay: 1e-4

data:
  path: "data/processed/train.h5"
  val_path: "data/processed/val.h5"
  window_size: 512
  stride: 128

dataloader:
  num_workers: 4
  pin_memory: true
